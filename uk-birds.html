<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>UK Birds</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --lime:       #A8E63D;
      --lime-dark:  #7ABF1A;
      --lime-mid:   #8FD128;
      --lime-light: #C9F07A;
      --lime-bg:    #EEF9D6;
      --bg:         #F4F4EE;
      --card:       #FFFFFF;
      --t1:         #1C1C1E;
      --t2:         #636366;
      --t3:         #AEAEB2;
      --sep:        #E5E5EA;
      --nav-bg:     rgba(244,244,238,0.94);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--t1);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 50px;
      padding: 14px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }
    .status-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .status-icons { display: flex; align-items: center; gap: 5px; }

    /* ── Back button ── */
    .back-bar {
      background: var(--bg);
      padding: 8px 16px 0;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 15px; font-weight: 500; color: var(--lime-dark);
      text-decoration: none; padding: 4px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }
    .back-btn svg { width: 10px; height: 16px; }

    /* ── Sticky Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      padding: 10px 20px 0;
      border-bottom: 0.5px solid var(--sep);
    }
    .nav-title-row {
      display: flex; align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 34px; font-weight: 700;
      letter-spacing: -0.8px; line-height: 1;
    }
    .counter {
      font-size: 15px; color: var(--t2);
      font-weight: 500; padding-bottom: 3px;
    }
    .counter strong { color: var(--lime-dark); font-weight: 700; }

    /* Search */
    .search-wrap {
      background: rgba(118,118,128,0.12);
      border-radius: 10px;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; margin-bottom: 10px;
    }
    .search-wrap svg { flex-shrink: 0; color: var(--t3); }
    .search-wrap input {
      border: none; background: transparent;
      font-size: 17px; color: var(--t1);
      width: 100%; outline: none; font-family: inherit;
    }
    .search-wrap input::placeholder { color: var(--t3); }
    .clear-btn {
      flex-shrink: 0; width: 18px; height: 18px;
      border-radius: 50%; background: var(--t3);
      border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center;
    }
    .clear-btn.show { display: flex; }

    /* Segment */
    .segment {
      background: rgba(118,118,128,0.12);
      border-radius: 9px; padding: 2px;
      display: flex; margin-bottom: 10px;
    }
    .seg {
      flex: 1; padding: 7px 4px;
      border: none; background: transparent;
      border-radius: 7px; font-size: 13px;
      font-weight: 500; color: var(--t1);
      cursor: pointer; transition: background 0.18s, box-shadow 0.18s;
      font-family: inherit;
    }
    .seg.active {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.13);
      font-weight: 600;
    }

    /* Progress */
    .progress-wrap { padding-bottom: 10px; }
    .progress-track {
      height: 3px; background: var(--sep);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--lime-mid) 0%, var(--lime) 100%);
      border-radius: 2px; width: 0%;
      transition: width 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── List ── */
    .list { padding: 10px 16px 110px; }

    /* ── Bird Card ── */
    .bird-card {
      background: var(--card);
      border-radius: 18px;
      padding: 13px 14px;
      margin-bottom: 9px;
      display: flex; align-items: center; gap: 13px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: transform 0.12s ease, background 0.22s, border-color 0.22s;
      border: 1.5px solid transparent;
      user-select: none; -webkit-user-select: none;
    }
    .bird-card:active { transform: scale(0.975); }
    .bird-card.seen {
      background: var(--lime-bg);
      border-color: var(--lime-light);
    }

    /* Avatar */
    .avatar {
      width: 58px; height: 58px;
      border-radius: 15px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .avatar svg { width: 44px; height: 44px; }

    /* Info */
    .bird-info { flex: 1; min-width: 0; }
    .bird-name {
      font-size: 16px; font-weight: 600;
      letter-spacing: -0.2px; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bird-sci {
      font-size: 12px; color: var(--t2);
      font-style: italic; margin-bottom: 7px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 2.5px 8px; border-radius: 20px;
      line-height: 1.3;
    }
    .b-common   { background: #EBEBF0; color: #636366; }
    .b-scarce   { background: #FFF3CD; color: #856404; }
    .b-rare     { background: #FFE0E0; color: #C0392B; }
    .b-winter   { background: #DDEEFF; color: #1A6BBF; }
    .b-gender   { background: #F2F2F7; color: var(--t2); }
    .b-dimorphic{ background: #EDE7F6; color: #6A1B9A; }

    /* Checkmark ring */
    .check {
      width: 28px; height: 28px;
      border-radius: 50%; border: 2px solid var(--sep);
      background: white;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.22s, border-color 0.22s, transform 0.22s;
    }
    .bird-card.seen .check {
      background: var(--lime);
      border-color: var(--lime-mid);
      transform: scale(1.07);
    }
    .check-tick { opacity: 0; transition: opacity 0.2s; }
    .bird-card.seen .check-tick { opacity: 1; }

    /* Empty state */
    .empty {
      padding: 64px 24px; text-align: center;
    }
    .empty-icon { font-size: 54px; margin-bottom: 16px; line-height: 1; }
    .empty h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty p { font-size: 15px; color: var(--t2); line-height: 1.5; }

    /* ── Tab Bar ── */
    .tab-bar {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-top: 0.5px solid var(--sep);
      display: flex; padding: 10px 0 28px;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 2px;
      font-size: 10px; font-weight: 500;
      color: var(--t3); cursor: pointer;
      transition: color 0.15s;
    }
    .tab.active { color: var(--lime-dark); }
    .tab svg { width: 26px; height: 26px; }
  </style>
</head>
<body>

<script>
/* ── SVG bird silhouettes ── */
function birdPerching(col) {
  return `<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="21" cy="27" rx="10" ry="7" fill="${col}" opacity="0.92"/>

    <path d="M11 27L4 33L4.5 29L11 29Z" fill="${col}" opacity="0.82"/>
    <path d="M16 23.5Q22 17 29 21" stroke="${col}" stroke-width="1.8" fill="none" opacity="0.4"/>
    <line x1="19" y1="34" x2="17" y2="40" stroke="${col}" stroke-width="1.6" stroke-linecap="round" opacity="0.65"/>

    <circle cx="31.5" cy="17" r="1.7" fill="rgba(0,0,0,0.32)"/>
    <circle cx="31.9" cy="16.6" r="0.55" fill="rgba(255,255,255,0.7)"/>
  </svg>`;
}

    <circle cx="31.9" cy="15.1" r="0.6" fill="rgba(255,255,255,0.7)"/>
  </svg>`;
}

function birdSwimmer(col) {
  return `<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="20" cy="28" rx="13" ry="8" fill="${col}" opacity="0.92"/>
    <circle cx="32" cy="20" r="6.5" fill="${col}" opacity="0.92"/>

function birdWader(col) {
  return `<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="21" cy="24" rx="10" ry="6.5" fill="${col}" opacity="0.92"/>

/* ── Family definitions ── */
const FAM = {
  robin:       { g:['#F4511E','#D84315'], fn: birdPerching },

  duck:        { g:['#1565C0','#0D47A1'], fn: birdSwimmer  },

  heron:       { g:['#607D8B','#455A64'], fn: birdWader    },
  starling:    { g:['#283593','#1A237E'], fn: birdPerching },
  dunnock:     { g:['#A1887F','#795548'], fn: birdPerching },
  nuthatch:    { g:['#0288D1','#01579B'], fn: birdPerching },
  treecreeper: { g:['#6D4C41','#4E342E'], fn: birdPerching },

/* ── Bird data ── */
const RAW = [
  { name:"Robin",                   sci:"Erithacus rubecula",          fam:"robin",       rarity:"common",  dim:false, winter:false },
  { name:"Blue Tit",                sci:"Cyanistes caeruleus",         fam:"tit",         rarity:"common",  dim:false, winter:false },
  { name:"Great Tit",               sci:"Parus major",                 fam:"tit",         rarity:"common",  dim:true,  winter:false },
  { name:"House Sparrow",           sci:"Passer domesticus",           fam:"sparrow",     rarity:"common",  dim:true,  winter:false },

  { name:"Chaffinch",               sci:"Fringilla coelebs",           fam:"finch",       rarity:"common",  dim:true,  winter:false },
  { name:"Woodpigeon",              sci:"Columba palumbus",            fam:"pigeon",      rarity:"common",  dim:false, winter:false },
  { name:"Magpie",                  sci:"Pica pica",                   fam:"corvid",      rarity:"common",  dim:false, winter:false },
  { name:"Carrion Crow",            sci:"Corvus corone",               fam:"corvid",      rarity:"common",  dim:false, winter:false },
  { name:"Jackdaw",                 sci:"Corvus monedula",             fam:"corvid",      rarity:"common",  dim:false, winter:false },
  { name:"Rook",                    sci:"Corvus frugilegus",           fam:"corvid",      rarity:"common",  dim:false, winter:false },
  { name:"Coal Tit",                sci:"Periparus ater",              fam:"tit",         rarity:"common",  dim:false, winter:false },
  { name:"Long-tailed Tit",         sci:"Aegithalos caudatus",         fam:"tit",         rarity:"common",  dim:false, winter:false },
  { name:"Goldfinch",               sci:"Carduelis carduelis",         fam:"finch",       rarity:"common",  dim:false, winter:false },

/* Fisher-Yates shuffle */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const BIRDS = shuffle(RAW);
const seen  = new Set();
let filter  = 'all';
let query   = '';

/* ── Render ── */
function render() {
  const q = query.toLowerCase();
  const visible = BIRDS.filter(b => {
    const ms = !q || b.name.toLowerCase().includes(q) || b.sci.toLowerCase().includes(q);
    const mf = filter === 'all'
      || (filter === 'seen'   &&  seen.has(b.name))
      || (filter === 'unseen' && !seen.has(b.name));
    return ms && mf;
  });

  const list = document.getElementById('bird-list');

  if (!visible.length) {
    const msg = filter === 'seen'
      ? { icon:'🔭', title:'No sightings yet', body:'Head outside and start ticking off your list!' }
      : { icon:'🐦', title:'No birds found',   body:'Try a different search term.' };
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">${msg.icon}</div>
      <h3>${msg.title}</h3>
      <p>${msg.body}</p>
    </div>`;
    return;
  }

  list.innerHTML = visible.map(b => {
    const def     = FAM[b.fam] || FAM.robin;
    const isSeen  = seen.has(b.name);
    const [c1,c2] = def.g;
    const svgHtml = def.fn('white');

    // Rarity badge
    let rarityBadge;
    if (b.winter)          rarityBadge = `<span class="badge b-winter">❄ Winter visitor</span>`;
    else if (b.rarity==='scarce') rarityBadge = `<span class="badge b-scarce">◆ Scarce</span>`;
    else if (b.rarity==='rare')   rarityBadge = `<span class="badge b-rare">★ Rare</span>`;
    else                          rarityBadge = `<span class="badge b-common">Common</span>`;

    // Gender badge
    const genderBadge = b.dim
      ? `<span class="badge b-dimorphic">♂ ♀ Dimorphic</span>`
      : `<span class="badge b-gender">♂ ≈ ♀</span>`;

    return `<div class="bird-card${isSeen ? ' seen' : ''}" onclick="toggle('${b.name.replace(/'/g,"\\'")}')">
      <div class="avatar" style="background:linear-gradient(140deg,${c1},${c2})">${svgHtml}</div>
      <div class="bird-info">
        <div class="bird-name">${b.name}</div>
        <div class="bird-sci">${b.sci}</div>
        <div class="badges">${rarityBadge}${genderBadge}</div>
      </div>
      <div class="check">
        <svg class="check-tick" width="14" height="11" viewBox="0 0 14 11" fill="none">
          <path d="M1.5 5.5L5 9L12.5 1.5" stroke="#1C1C1E" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>`;
  }).join('');
}

function toggle(name) {
  seen.has(name) ? seen.delete(name) : seen.add(name);
  const n = seen.size;
  document.getElementById('seen-count').textContent = n;
  document.getElementById('progress-fill').style.width = (n / 50 * 100) + '%';
  render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.seg').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function onSearch() {
  query = document.getElementById('search-input').value;
  document.getElementById('clear-btn').classList.toggle('show', query.length > 0);
  render();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  query = '';
  document.getElementById('clear-btn').classList.remove('show');
  render();
}

render();
</script>
